<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
{% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#243447">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@600;700&display=swap">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <div class="site-shell">
      <aside class="profile-sidebar" aria-label="Profile">
        <div class="profile-panel">
          <div class="profile-mark" aria-hidden="true">JL</div>
          <p class="eyebrow">Ph.D. Candidate</p>
          <h1>{{ page.title | default: site.title }}</h1>
          <p class="profile-tagline">{{ page.description | default: site.description }}</p>
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="#about">About</a>
            <a href="#experience">Experience</a>
            <a href="#publications">Publications</a>
          </nav>
          <div class="profile-links">
            <a href="https://scholar.google.com/citations?hl=en&user=2pbOVBcAAAAJ&view_op=list_works&sortby=pubdate">Google Scholar</a>
            <a href="https://github.com/MasLiang">GitHub</a>
          </div>
        </div>
      </aside>

      <main id="content" class="main-content" role="main">
        {{ content }}

        <footer class="site-footer">
          <span>Built with GitHub Pages.</span>
        </footer>
      </main>
    </div>
  </body>
</html>
